<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Goldline Test Customer</title>
    <link rel="stylesheet" href="/testuser/styles.css?v=test-settings">
  </head>
  <body>
    <main class="test-shell">
      <section id="identity-panel" class="identity-panel">
        <div>
          <p class="eyebrow">Website test channel</p>
          <h1>Goldline Customer Chat</h1>
          <p class="lede">Use this page as a customer on a website widget. Your messages are saved to Redis as a website conversation.</p>
        </div>

        <form id="identity-form" class="identity-form">
          <label>
            Display name
            <input id="display-name-input" name="displayName" type="text" maxlength="80" placeholder="Example: Mick" autocomplete="name" required>
          </label>
          <label>
            Test user ID
            <input id="user-id-input" name="userId" type="text" maxlength="64" autocomplete="username" required>
          </label>
          <button type="submit">Start chat</button>
        </form>
      </section>

      <section id="chat-panel" class="chat-panel" hidden>
        <header class="chat-header">
          <div>
            <p class="eyebrow">Goldline Bullion</p>
            <h1>Customer Chat</h1>
            <p id="conversation-label">Website customer</p>
          </div>
          <button id="change-user-button" type="button">Change user</button>
        </header>

        <section class="test-controls" aria-label="Test conversation settings">
          <label>
            Responding AI
            <select id="bot-select">
              <option value="baseline">Baseline Bot</option>
              <option value="tagAware">Tag-Aware Bot</option>
            </select>
          </label>
          <div class="tag-settings">
            <label>
              Test tags
              <input id="tag-input" type="text" maxlength="40" placeholder="Add tag, then Enter" autocomplete="off">
            </label>
            <div id="tag-list" class="tag-list" aria-live="polite"></div>
            <button id="save-tags-button" type="button">Save tags</button>
          </div>
        </section>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="message-form" class="message-form">
          <input id="message-input" type="text" maxlength="2000" placeholder="Ask about bars, coins, purity, or pricing..." autocomplete="off">
          <button id="send-button" type="submit" title="Send">&rarr;</button>
        </form>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/testuser/app.js?v=test-settings" type="module"></script>
  </body>
</html>
