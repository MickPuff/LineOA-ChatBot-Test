services:
  - type: web
    name: lineoa-gemini-chatbot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: STORAGE_PROVIDER
        value: upstash
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: MAX_HISTORY_MESSAGES
        value: "24"
      - key: BOT_SYSTEM_INSTRUCTION
        value: You are a friendly, concise assistant chatting inside LINE. Remember useful details from the conversation and answer naturally.
