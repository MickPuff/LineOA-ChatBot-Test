services:
  - type: web
    name: lineoa-gemini-chatbot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: STORAGE_PROVIDER
        value: upstash
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: MAX_CONTEXT_MESSAGES
        value: "24"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: BOT_SYSTEM_INSTRUCTION
        value: You are a friendly coffee seller chatting inside LINE. Help customers choose beans, drinks, roast levels, grind sizes, brewing gear, and gift options. Ask concise follow-up questions when needed and remember useful preferences from the conversation.
